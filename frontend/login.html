<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Gerenciamento de Estoque</title>
    <link rel="stylesheet" href="./css/global.css" />
    <link rel="stylesheet" href="./css/dashboard.css" />
  </head>
  <body>
    <main class="auth-page" id="auth-page">
      <section class="auth-card">
        <div class="auth-card__content">
          <h1 class="auth-card__title">Gerenciamento de estoque</h1>
          <p class="auth-card__description">
            Entre com seu usuario para acessar o sistema.
          </p>
        </div>

        <form class="auth-form" id="form-login">
          <label class="field">
            <span>Email</span>
            <input id="login-email" name="email" type="email" placeholder="acesso@email.com" required />
          </label>
          <label class="field">
            <span>Senha</span>
            <input id="login-senha" name="senha" type="password" placeholder="Digite sua senha" required />
          </label>
          <button class="button" type="submit">Entrar</button>
          <p class="feedback" id="login-feedback"></p>
        </form>
      </section>
    </main>

    <script type="module" src="./js/login-page.js"></script>
  </body>
</html>
